<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Find x⁺ and x⁻</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #111;
    color: pink;
    padding-top: 120px;
}
h1 {
    font-size: 28px;
}
.formula {
    font-size: 34px;
    margin-top: 40px;
    color: #00ffcc;
}
</style>
</head>
<body>

<h1>
This quadratic equation represents the exact current time.<br>
Find x⁺ and x⁻.
</h1>

<div class="formula" id="formula"></div>

<script>
function updateTime() {
    const now = new Date();

    let H = now.getHours();
    let M = now.getMinutes();

    // Build quadratic with roots:
    // x⁺ = H
    // x⁻ = -M

    let b = M - H;
    let c = -H * M;

    let formula = `x²`;

    if (b !== 0) {
        formula += b > 0 ? ` + ${b}x` : ` - ${Math.abs(b)}x`;
    }

    if (c !== 0) {
        formula += c > 0 ? ` + ${c}` : ` - ${Math.abs(c)}`;
    }

    formula += " = 0";

    document.getElementById("formula").innerHTML = formula;
}

setInterval(updateTime, 1000);
updateTime();
</script>

</body>
</html>
